# MCP 集成配置

# MCP 服务器配置
mcp:
  # 已配置的服务器
  servers:
    # 示例：Linear
    linear:
      enabled: false
      type: stdio
      command: linear-mcp-server
      args: []
    
    # 示例：GitHub
    github:
      enabled: false
      type: stdio
      command: github-mcp-server
      args: []
    
    # 示例：FileSystem
    filesystem:
      enabled: true
      type: stdio
      command: npx
      args: ["-y", "@modelcontextprotocol/server-filesystem"]
      root: "D:\\OpenClaw\\workspace"

# 认证配置
auth:
  # OAuth 服务器
  oauth:
    enabled: false
    servers: []
  
  # API Keys
  api_keys:
    linear: ""
    github: ""
    notion: ""

# 工具调用配置
tools:
  # 默认超时
  timeout_seconds: 60
  
  # 重试配置
  retry:
    enabled: true
    max_attempts: 3
    delay_seconds: 1
  
  # 日志
  logging:
    enabled: true
    level: info

# 代码生成配置
codegen:
  # 生成 CLI
  generate_cli:
    enabled: false
    output_dir: scripts/mcp-clis
  
  # 生成 TypeScript 类型
  emit_ts:
    enabled: false
    output_dir: types/mcp

# Daemon 配置
daemon:
  enabled: false
  auto_start: false
  port: 8888

# 安全配置
security:
  # 允许的服务器
  allowlist:
    enabled: false
    servers: []
  
  # 沙盒模式
  sandbox:
    enabled: true
    readonly: true
