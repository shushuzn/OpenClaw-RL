# TDD 模式 Coding Agent 配置

# 核心配置
tdd_mode:
  enabled: true  # 启用 TDD 模式
  auto_generate_tests: true  # 自动生成测试
  max_retry_cycles: 10  # 最大重试次数
  require_tests_before_fix: true  # 修复前必须先写测试

# 测试配置
testing:
  # 测试框架
  framework: auto  # auto, pytest, jest, vitest, mocha
  
  # 测试生成
  generate:
    unit_tests: true  # 单元测试
    integration_tests: false  # 集成测试
    e2e_tests: false  # E2E 测试
  
  # 测试执行
  run:
    parallel: true  # 并行执行
    timeout_seconds: 60  # 超时时间
    retry_failed: true  # 自动重试失败测试
  
  # 覆盖率
  coverage:
    enabled: true
    min_percent: 80  # 最低覆盖率要求
    report: true  # 生成报告

# 可观测性配置
observability:
  # 自动插桩
  auto_instrument: true
  
  # 日志
  logging:
    enabled: true
    level: debug  # debug, info, warning, error
    format: json  # json, text
  
  # 追踪
  tracing:
    enabled: true
    sample_rate: 1.0  # 100% 采样
  
  # 指标
  metrics:
    enabled: true
    collect:
      - execution_time
      - error_rate
      - test_coverage

# Debug 流水线
debug_pipeline:
  # 阶段 1: 问题复现
  reproduce:
    enabled: true
    auto_create_test: true  # 自动创建复现测试
    save_failing_test: true  # 保存失败的测试
  
  # 阶段 2: 增强可观测性
  instrument:
    enabled: true
    add_logging: true  # 添加日志
    add_tracing: true  # 添加追踪
    add_metrics: true  # 添加指标
    print_variables: true  # 打印关键变量
  
  # 阶段 3: AI 修复循环
  fix_cycle:
    enabled: true
    max_iterations: 10  # 最大迭代次数
    stop_on_first_pass: true  # 首次通过即停止
    analyze_failures: true  # 分析失败原因
  
  # 阶段 4: 验证
  validate:
    enabled: true
    run_all_tests: true  # 运行所有测试
    check_coverage: true  # 检查覆盖率
    manual_review: false  # 不需要人工审查

# 子代理配置
subagent:
  enabled: true  # 使用子代理
  roles:
    - test_writer  # 测试编写者
    - debugger  # 调试者
    - reviewer  # 审查者
  
  # 并行执行
  parallel:
    enabled: true
    max_concurrent: 3

# 重试策略
retry:
  # 指数退避
  backoff:
    enabled: true
    initial_delay_seconds: 1
    max_delay_seconds: 30
    multiplier: 2
  
  # 重试条件
  conditions:
    - test_failed  # 测试失败
    - compilation_error  # 编译错误
    - timeout  # 超时
  
  # 跳过重试
  skip_on:
    - logic_error  # 逻辑错误 (需要人工干预)
    - design_flaw  # 设计缺陷

# 报告配置
reporting:
  # 生成报告
  generate:
    summary: true  # 修复摘要
    test_results: true  # 测试结果
    coverage_report: true  # 覆盖率报告
    timeline: true  # 时间线
  
  # 报告格式
  format: markdown  # markdown, json, html
  
  # 保存位置
  output_dir: reports/tdd-debug
  
  # 详细程度
  verbosity: detailed  # minimal, normal, detailed

# 集成配置
integration:
  # GitHub
  github:
    auto_comment: false  # 自动评论 PR
    update_pr: false  # 更新 PR
  
  # 通知
  notification:
    on_success: true  # 成功时通知
    on_failure: true  # 失败时通知
    on_max_retries: true  # 达到最大重试时通知

# 性能配置
performance:
  # 超时
  timeout:
    total_minutes: 30  # 总超时
    per_cycle_minutes: 3  # 每轮超时
  
  # 资源限制
  limits:
    max_file_size_mb: 10  # 最大文件大小
    max_test_count: 100  # 最大测试数量
    max_output_lines: 1000  # 最大输出行数

# 安全配置
security:
  # 代码执行
  code_execution:
    sandbox: true  # 沙盒执行
    network_access: false  # 禁止网络访问
    file_write_limit: true  # 限制文件写入
  
  # 敏感信息
  sensitive:
    redact_api_keys: true  # 隐藏 API 密钥
    redact_passwords: true  # 隐藏密码
