# Weather 配置

# 数据源配置
source:
  # 默认数据源
  default: wttr.in  # wttr.in, open-meteo
  
  # wttr.in 配置
  wttr:
    base_url: https://wttr.in
    format: "%c+%C+%t+%h+%w+%p"  # 图标 + 天气 + 温度 + 湿度 + 风速 + 降水
    
  # Open-Meteo 配置
  open_meteo:
    base_url: https://api.open-meteo.com/v1
    hourly: true
    daily: true

# 位置配置
location:
  # 默认位置
  default: Beijing
  
  # 位置列表
  locations:
    - name: Beijing
      query: "Beijing,China"
    - name: Shanghai
      query: "Shanghai,China"
    - name: Shenzhen
      query: "Shenzhen,China"
    - name: Hong Kong
      query: "Hong Kong"

# 预报配置
forecast:
  # 默认天数
  days: 3  # 1-7
  
  # 包含小时预报
  hourly: false
  
  # 包含分钟预报
  minutely: false

# 输出配置
output:
  # 格式
  format: text  # text, json, markdown
  
  # 单位
  units: metric  # metric, imperial
  
  # 语言
  language: zh  # zh, en, ja, etc.

# 显示配置
display:
  # 显示图标
  icons: true
  
  # 显示详细信息
  details: true
  
  # 显示日出日落
  sunrise_sunset: true
  
  # 显示月相
  moon_phase: false

# 缓存配置
cache:
  # 启用缓存
  enabled: true
  
  # 缓存时间 (分钟)
  ttl_minutes: 30
