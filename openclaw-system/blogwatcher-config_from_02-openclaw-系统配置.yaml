# Blogwatcher 配置文件

# CLI 配置
cli:
  name: blogwatcher
  version: latest
  install_method: go  # go, manual
  binary_path: ""  # 留空则使用 PATH 中的命令

# 订阅源配置
sources:
  # AI 专家博客
  - name: "Andrej Karpathy"
    url: https://karpathy.ai/feed.xml
    tags: ["ai", "llm", "deep-learning"]
  
  - name: "Simon Willison"
    url: https://simonwillison.net/atom/everything/
    tags: ["ai", "llm", "tools", "mcp"]
  
  - name: "Sebastian Raschka"
    url: https://sebastianraschka.com/rss_feed.xml
    tags: ["ai", "machine-learning", "education"]
  
  # 机构博客
  - name: "OpenAI Blog"
    url: https://openai.com/blog/rss/
    tags: ["ai", "openai", "research"]
  
  - name: "Anthropic Updates"
    url: https://www.anthropic.com/news/rss
    tags: ["ai", "anthropic", "safety"]
  
  - name: "Google AI Blog"
    url: https://ai.google/blog/
    tags: ["ai", "google", "research"]
  
  # 技术博客
  - name: "Jay Alammar"
    url: https://jalammar.github.io/feed.xml
    tags: ["ai", "nlp", "visualization"]
  
  - name: "Lilian Weng"
    url: https://lilianweng.github.io/index.xml
    tags: ["ai", "research", "openai"]

# 扫描配置
scan:
  interval_hours: 6  # 每 6 小时扫描
  auto_scan: true
  max_articles_per_scan: 50  # 每次最多处理文章数
  
# 内容提取
extraction:
  extract_full_content: true
  extract_images: false
  extract_links: true
  max_content_length: 50000  # 最大字符数

# 去重配置
deduplication:
  enabled: true
  method: url  # url, title, content_hash
  lookback_days: 7  # 检查最近 7 天

# 质量过滤
filter:
  min_content_length: 500  # 最小内容长度
  exclude_keywords:
    - "sponsor"
    - "advertisement"
    - "promo"
  include_keywords: []  # 留空则不过滤

# 输出配置
output:
  dir: Medium/Blogwatcher
  format: markdown
  organize_by: source  # source, date, tags
  archive_after_days: 30  # 30 天后归档

# 标签配置
tags:
  auto_generate: true
  from_source: true  # 使用源配置的标签
  from_content: true  # 从内容提取标签

# 通知配置
notify:
  on_new_article: false  # 新文章通知
  on_high_priority: true  # 高优先级通知
  daily_digest: true  # 每日摘要

# 与 AI Research OS 集成
ai_research_os:
  auto_trigger: false  # 不自动触发深度分析
  high_priority_tags:  # 高优先级标签触发
    - "agentic-ai"
    - "reasoning"
    - "mcp"

# 定时任务
schedule:
  enabled: true
  scan_time: "*/6 * * * *"  # 每 6 小时
  timezone: "Asia/Shanghai"
