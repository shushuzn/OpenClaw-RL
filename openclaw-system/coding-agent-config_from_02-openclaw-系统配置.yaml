# Coding Agent 配置文件

# 代理配置
agents:
  # Codex
  codex:
    enabled: true
    command: codex
    pty: true  # 需要 PTY
    timeout_minutes: 30
    
  # Claude Code
  claude:
    enabled: true
    command: claude
    pty: true
    timeout_minutes: 30
    
  # Pi
  pi:
    enabled: false
    command: pi
    pty: true
    timeout_minutes: 30

# 工作目录配置
workdir:
  use_temp: true  # 使用临时目录
  temp_prefix: coding-agent-
  cleanup_after: true  # 完成后清理

# Git 配置
git:
  auto_init: true  # 自动初始化 git 仓库
  user_name: "AI Assistant"
  user_email: "assistant@local"

# 子代理配置
subagent:
  enabled: true
  max_concurrent: 3
  timeout_minutes: 60

# 使用场景配置
use_cases:
  # 构建新功能
  build_feature:
    agent: codex
    create_pr: true
    
  # 代码审查
  review_pr:
    agent: claude
    temp_dir: true
    
  # 重构代码
  refactor:
    agent: codex
    create_branch: true
    
  # 修复 bug
  fix_bug:
    agent: codex
    create_pr: true

# 日志配置
logging:
  enabled: true
  dir: logs/coding-agent
  level: info
