# Binance Skills Hub 集成配置

# API 配置
api:
  binance:
    base_url: https://api.binance.com
    testnet: true  # 使用测试网络
    api_key: ""  # 留空则使用环境变量 BINANCE_API_KEY
    secret_key: ""  # 留空则使用环境变量 BINANCE_SECRET_KEY
  
  web3:
    base_url: https://web3.binance.com
    chain_id: "CT_501"  # Solana, 或 "56" for BSC

# 技能配置
skills:
  # Spot 交易技能
  spot:
    enabled: true
    test_mode: true  # 使用测试模式下单
    default_symbol: BTCUSDT
    max_retries: 3
    
  # Web3 技能
  web3:
    enabled: true
    
    # Smart Money 信号
    trading_signal:
      enabled: true
      page_size: 50
      chain: solana  # solana 或 bsc
    
    # 代币查询
    token_info:
      enabled: true
    
    # 代币审计
    token_audit:
      enabled: true
    
    # 地址查询
    address_info:
      enabled: true

# 交易配置
trading:
  # 风险控制
  risk:
    max_position_size_usdt: 100  # 最大持仓
    max_daily_trades: 10  # 每日最大交易次数
    stop_loss_percent: 5  # 止损百分比
    take_profit_percent: 10  # 止盈百分比
  
  # 订单类型
  order:
    default_type: LIMIT  # MARKET, LIMIT, STOP_LOSS, etc.
    default_time_in_force: GTC  # GTC, IOC, FOK
    default_quantity: 0.001  # BTC
  
  # 自动交易
  auto:
    enabled: false  # 默认禁用自动交易
    require_confirmation: true  # 需要确认

# 监控配置
monitoring:
  # 价格监控
  price_alerts:
    enabled: true
    symbols:
      - BTCUSDT
      - ETHUSDT
      - BNBUSDT
    threshold_percent: 5  # 价格波动超过 5% 告警
  
  # 信号监控
  signals:
    enabled: true
    smart_money: true  # Smart Money 信号
    trading_day: true  # 交易日信号
  
  # 钱包监控
  wallets:
    enabled: false
    addresses: []  # 要监控的钱包地址

# 通知配置
notification:
  enabled: false
  channel: ""  # Telegram channel ID
  on_trade: true  # 交易完成通知
  on_alert: true  # 价格告警通知
  on_signal: true  # 信号通知

# 日志配置
logging:
  enabled: true
  dir: logs/binance
  level: info
  save_trades: true  # 保存交易记录
  save_signals: true  # 保存信号记录

# 安全配置
security:
  # API 权限
  api_permissions:
    spot_trading: true
    margin_trading: false
    futures_trading: false
    withdraw: false  # 禁用提现
  
  # IP 限制
  ip_restriction: false
  
  # 2FA
  two_factor_auth: false

# 定时任务
schedule:
  # 每日统计
  daily_stats:
    enabled: true
    time: "23:59"
  
  # 信号扫描
  signal_scan:
    enabled: true
    interval_minutes: 15  # 每 15 分钟扫描
  
  # 价格更新
  price_update:
    enabled: true
    interval_minutes: 1  # 每分钟更新
