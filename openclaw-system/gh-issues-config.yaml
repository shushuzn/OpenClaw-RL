# GitHub Issues 自动修复配置

# GitHub 配置
github:
  source_repo: ""  # 留空则从当前 git remote 检测
  fork: ""  # 如果有 fork 则填写 user/repo
  default_branch: main

# Issue 过滤配置
filters:
  labels: []  # 留空则不过滤，或填写 ["bug", "enhancement"]
  milestone: ""  # 留空则不过滤
  assignee: ""  # 留空则不过滤，或填写 "@me"
  state: open  # open, closed, all
  limit: 10  # 每次获取的 issue 数量

# 子代理配置
agent:
  model: ""  # 留空则使用默认模型
  timeout_minutes: 30
  max_concurrent: 3

# 工作模式
mode:
  watch: false  # 持续监控模式
  interval_minutes: 5  # 轮询间隔
  reviews_only: false  # 仅处理 PR 评论
  cron: false  # Cron 安全模式
  dry_run: false  # 仅测试不执行

# 通知配置
notify:
  enabled: false
  channel: ""  # Telegram channel ID

# 确认配置
confirm:
  skip: false  # 跳过确认 (--yes)
  auto_process_all: false  # 自动处理所有 issues
