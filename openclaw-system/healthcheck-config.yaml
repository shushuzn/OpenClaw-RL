# Healthcheck 配置文件

# 安全审计配置
security_audit:
  enabled: true
  deep_scan: true  # 深度扫描
  frequency: weekly  # 每周执行
  day_of_week: "Sunday"
  time: "03:00"

# 检查项目
checks:
  # OpenClaw 安全
  openclaw_security:
    enabled: true
    min_version: "2026.3.0"
  
  # 磁盘使用
  disk_usage:
    enabled: true
    warning_threshold: 85  # 85% 警告
    critical_threshold: 95  # 95% 严重
  
  # Git 同步状态
  git_sync:
    enabled: true
    repo_path: D:\OpenClaw\workspace
    check_uncommitted: true
    check_unpushed: true
  
  # DLP 扫描 (数据泄露防护)
  dlp_scan:
    enabled: true
    scan_paths:
      - D:\OpenClaw\workspace\memory
      - D:\OpenClaw\workspace\Medium
    patterns:
      - "API_KEY"
      - "PASSWORD"
      - "SECRET"
      - "TOKEN"
  
  # 技能完整性
  skills_integrity:
    enabled: true
    check_all: true
  
  # 系统更新
  system_updates:
    enabled: true
    check_openclaw: true
    check_python: true
    check_node: true
  
  # 防火墙状态
  firewall:
    enabled: false  # Windows 需要管理员权限
    check_gateway_port: true
  
  # SSH 配置 (如果有)
  ssh:
    enabled: false
    check_key_permissions: true
    check_root_login: false
  
  # 备份状态
  backup:
    enabled: true
    check_backup_exists: true
    max_age_days: 7  # 备份不超过 7 天

# 风险容忍度
risk_tolerance:
  level: "balanced"  # conservative, balanced, aggressive
  allow_public_exposure: false  # 不允许公网暴露
  require_encryption: true  # 要求磁盘加密
  require_backups: true  # 要求备份

# 通知配置
notification:
  on_failure: true
  on_warning: true
  on_success: false
  channel: "memory"  # 保存到 memory 目录

# 输出配置
output:
  dir: D:\OpenClaw\workspace\reports
  format: markdown
  keep_history: true
  max_reports: 10  # 保留最近 10 份报告

# 自动修复
auto_fix:
  enabled: false  # 不自动修复 (需要用户确认)
  safe_only: true  # 仅执行安全操作
