# Model Usage 配置文件

# 数据源配置
source:
  provider: codexbar  # codexbar, claudebar, manual
  data_dir: ""  # 留空则使用默认路径

# 分析配置
analysis:
  # 当前模型 (最近使用)
  current_model:
    enabled: true
    use_latest: true
    
  # 所有模型统计
  all_models:
    enabled: true
    group_by: day  # day, week, month
    
  # 成本分析
  cost:
    enabled: true
    currency: USD
    include_cache: true
    
  # Token 统计
  tokens:
    enabled: true
    breakdown: true  # 按输入/输出分解

# 输出配置
output:
  format: text  # text, json, markdown
  pretty: true  # 美化输出
  output_file: ""  # 留空则输出到控制台

# 过滤配置
filter:
  models: []  # 留空则包含所有模型
  date_from: ""  # YYYY-MM-DD
  date_to: ""  # YYYY-MM-DD
  min_cost: 0  # 最小成本过滤

# 报告配置
report:
  enabled: true
  frequency: weekly  # daily, weekly, monthly
  include_charts: false  # 需要额外依赖
  top_n: 10  # 显示前 N 个模型

# 集成配置
integration:
  save_to_memory: false  # 保存到 MEMORY.md
  notify_on_threshold: false  # 成本超阈值通知
  threshold_usd: 10  # 阈值金额
