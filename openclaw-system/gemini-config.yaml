# Google Gemini 配置

# API 配置
api:
  key: ""  # 留空则使用环境变量 GOOGLE_API_KEY
  base_url: https://generativelanguage.googleapis.com
  
# 模型配置
models:
  # 默认模型
  default: gemini-2.0-flash
  
  # 可用模型
  available:
    - gemini-2.0-flash
    - gemini-1.5-pro
    - gemini-1.5-flash
  
# 生成配置
generation:
  # 温度
  temperature: 0.7
  
  # 最大 token
  max_output_tokens: 8192
  
  # Top P
  top_p: 0.95
  
  # Top K
  top_k: 40

# 输出配置
output:
  # 默认格式
  format: text  # text, json, markdown
  
  # JSON Schema (可选)
  json_schema: null

# 扩展配置
extensions:
  enabled: false
  list: []

# 安全配置
safety:
  # 安全设置
  settings:
    - category: HARM_CATEGORY_HARASSMENT
      threshold: BLOCK_MEDIUM_AND_ABOVE
    - category: HARM_CATEGORY_HATE_SPEECH
      threshold: BLOCK_MEDIUM_AND_ABOVE

# 使用配置
usage:
  # 单次使用
  one_shot: true
  
  # 避免交互模式
  avoid_interactive: true
