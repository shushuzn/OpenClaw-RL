# OpenAI Image Generation 配置

# API 配置
api:
  key: ""  # 留空则使用环境变量 OPENAI_API_KEY
  base_url: https://api.openai.com/v1

# 模型配置
models:
  # 默认模型
  default: gpt-image-1
  
  # 可用模型
  available:
    - gpt-image-1
    - gpt-image-1.5
    - dall-e-3
    - dall-e-2

# 生成配置
generation:
  # 默认数量
  count: 4
  
  # 默认尺寸
  size: 1024x1024
  
  # 默认质量
  quality: standard  # standard, high
  
  # 默认风格
  style: vivid  # vivid, natural (DALL-E 3)
  
  # 背景 (gpt-image-1.5)
  background: opaque  # opaque, transparent
  
  # 输出格式
  output_format: png  # png, webp, jpeg

# 输出配置
output:
  # 输出目录
  dir: images/generated
  
  # 生成画廊
  gallery: true
  
  # 画廊文件名
  gallery_file: index.html

# 提示词配置
prompt:
  # 随机提示词采样
  random_sampler: true
  
  # 提示词文件
  file: prompts.txt
  
  # 增强提示词
  enhance: true

# 批处理配置
batch:
  # 批量生成
  enabled: true
  
  # 最大并发
  max_concurrent: 4
  
  # 超时 (秒)
  timeout: 300
