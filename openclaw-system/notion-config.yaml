# Notion 集成配置

# API 配置
api:
  key: ""  # 留空则使用环境变量 NOTION_API_KEY
  version: "2025-09-03"  # API 版本
  base_url: https://api.notion.com/v1

# 工作空间配置
workspace:
  # 默认工作空间 ID
  default_id: ""
  
  # 已连接的工作空间
  connected: []

# 页面配置
pages:
  # 默认父页面
  default_parent: ""
  
  # 页面模板
  templates:
    note: |
      # {title}
      
      创建时间：{created_time}
      标签：{tags}
      
      ---
      
      {content}
    
    meeting: |
      # 会议记录：{title}
      
      日期：{date}
      参会人：{attendees}
      
      ## 议程
      {agenda}
      
      ## 讨论要点
      {notes}
      
      ## 行动项
      {action_items}

# 数据库配置
databases:
  # 已连接的数据库
  connected: []
  
  # 数据库映射
  mappings:
    tasks:
      id: ""
      properties:
        title: "Name"
        status: "Status"
        due_date: "Due Date"

# 同步配置
sync:
  # 自动同步
  enabled: false
  
  # 同步间隔 (分钟)
  interval: 15
  
  # 双向同步
  bidirectional: false

# 搜索配置
search:
  # 默认搜索范围
  scope: all  # all, pages, databases
  
  # 过滤器
  filters: []

# 块配置
blocks:
  # 支持的块类型
  supported_types:
    - paragraph
    - heading_1
    - heading_2
    - heading_3
    - bulleted_list_item
    - numbered_list_item
    - to_do
    - code
    - image
    - divider

# 导入/导出配置
import_export:
  # 导出格式
  export_format: markdown  # markdown, html, pdf
  
  # 导入格式
  import_format: markdown
  
  # 导出目录
  export_dir: exports/notion
