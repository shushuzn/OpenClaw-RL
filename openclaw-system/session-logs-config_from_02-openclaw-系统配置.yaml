# Session Logs 配置文件

# 日志路径
logs:
  base_dir: C:\Users\华为\.openclaw\agents\main\sessions
  index_file: sessions.json
  format: jsonl

# 分析配置
analysis:
  enabled: true
  extract_user_messages: true
  extract_assistant_messages: true
  extract_tool_calls: true
  extract_usage_cost: true

# 搜索配置
search:
  enabled: true
  use_ripgrep: true  # 使用 rg 进行快速搜索
  case_sensitive: false
  max_results: 50

# 导出配置
export:
  enabled: true
  output_dir: D:\OpenClaw\workspace\reports\session-exports
  format: markdown  # markdown, json, text
  include_metadata: true

# 清理配置
cleanup:
  enabled: false  # 不自动清理
  max_age_days: 90  # 保留 90 天
  compress_old: true  # 压缩旧日志
  compress_after_days: 30

# 隐私配置
privacy:
  redact_sensitive: true  # 脱敏敏感信息
  patterns:
    - "sk-[a-zA-Z0-9]+"  # API Keys
    - "password[\"']?\\s*[:=]"  # 密码
    - "token[\"']?\\s*[:=]"  # Token

# 统计配置
statistics:
  enabled: true
  daily_cost: true
  weekly_summary: true
  monthly_report: true
  top_topics: true

# 定时任务
schedule:
  daily_summary:
    enabled: true
    time: "23:30"
  weekly_report:
    enabled: true
    day: "Sunday"
    time: "22:00"
  monthly_report:
    enabled: true
    day: 1  # 每月 1 号
    time: "21:00"
